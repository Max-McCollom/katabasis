name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backstop only. On a public repo the commit is already public by the
      # time CI runs, so this cannot be the gate against leakage; the
      # pre-commit hook is. This re-checks every tracked file regardless.
      - name: Allowlist backstop
        run: sh .githooks/allowlist-check.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Backstop for the public/private boundary on data: the shipped telemetry
      # fixture must remain schema-safe, DEMO_SYNTHETIC, and payload-free.
      - name: Telemetry fixture backstop
        run: node tools/validate-public-telemetry.mjs

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
